<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Job Matcher Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 2rem;
        }
        .auth-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .auth-logo .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .auth-logo span { font-size: 1.2rem; font-weight: 700; color: white; }
        .auth-title { text-align: center; font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 0.4rem; }
        .auth-subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; font-weight: 500; }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 12px 14px;
            color: white;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus { border-color: #667eea; background: rgba(102,126,234,0.05); }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
        .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: rgba(255,255,255,0.5); }
        .auth-footer a { color: #a78bfa; text-decoration: none; font-weight: 600; }
        .auth-error {
            background: rgba(252,129,129,0.1);
            border: 1px solid rgba(252,129,129,0.3);
            color: #fc8181;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-success {
            background: rgba(72,187,120,0.1);
            border: 1px solid rgba(72,187,120,0.3);
            color: #68d391;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <section class="auth-page">
        <div class="hero-bg">
            <div class="hero-orb orb1"></div>
            <div class="hero-orb orb2"></div>
        </div>

        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">🤖</div>
                <span>AI Job Matcher Pro</span>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to analyze your resume with AI</p>

            <div class="auth-error" id="errorBox"></div>
            <div class="auth-success" id="successBox"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup">Sign Up Free</a>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    successBox.textContent = 'Login successful! Redirecting...';
                    successBox.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    errorBox.textContent = data.error || 'Login failed!';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
    </script>

</body>
</html>
